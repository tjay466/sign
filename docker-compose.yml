services:
  signage:
    image: ghcr.io/tjay466/sign:latest
    container_name: signage_display
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "--eval", "fetch('http://localhost:3000/api/signage').then(res => res.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
